<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>逍遥导航站</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <h1>逍遥导航站</h1>
                <p>简约 · 高效 · 实用</p>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索网站...">
                <button id="searchBtn">搜索</button>
            </div>
        </div>
    </header>

    <nav class="category-nav">
        <div class="container">
            <ul id="categoryList">
                <li class="active" data-category="all">全部</li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            <div id="navGrid" class="nav-grid"></div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 逍遥导航站 · 简约大气</p>
            <a href="admin.html" class="admin-link">管理后台</a>
        </div>
    </footer>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
